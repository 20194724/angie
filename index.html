<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VK Integrated Solutions | Cleaning &amp; Property Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #002967;
    --navy-2: #01397f;
    --blue: #0064c1;
    --blue-light: #4a9de8;
    --green: #4c9a2a;
    --green-light: #7bc94f;
    --ink: #0b1b33;
    --paper: #f5f8fb;
    --paper-2: #eaf1f7;
    --white: #ffffff;
    --line: #dfe7ee;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter', sans-serif;
    color:var(--ink);
    background:var(--white);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Poppins', sans-serif; color:var(--navy); letter-spacing:-0.01em;}
  a{text-decoration:none; color:inherit;}
  img{display:block; max-width:100%;}
  ul{list-style:none;}
  .container{width:min(1180px, 92%); margin-inline:auto;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:.5rem;
    font-family:'Poppins', sans-serif; font-weight:700; font-size:.72rem;
    letter-spacing:.16em; text-transform:uppercase; color:var(--green);
  }
  .eyebrow::before{content:""; width:22px; height:2px; background:var(--green); display:inline-block;}
  .btn{
    display:inline-flex; align-items:center; gap:.55rem;
    font-family:'Poppins', sans-serif; font-weight:600; font-size:.92rem;
    padding:.9rem 1.6rem; border-radius:8px; border:2px solid transparent;
    cursor:pointer; transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn-green{background:var(--green); color:var(--white); box-shadow:0 8px 20px -8px rgba(76,154,42,.6);}
  .btn-green:hover{background:var(--green-light); transform:translateY(-2px);}
  .btn-outline{border-color:var(--white); color:var(--white);}
  .btn-outline:hover{background:rgba(255,255,255,.12); transform:translateY(-2px);}
  .btn-navy{background:var(--navy); color:var(--white);}
  .btn-navy:hover{background:var(--navy-2); transform:translateY(-2px);}

  /* ===== HEADER ===== */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(255,255,255,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-wrap{display:flex; align-items:center; justify-content:space-between; padding:.7rem 0;}
  .brand{display:flex; align-items:center; gap:.65rem;}
  .brand img{height:74px; width:auto;}
  nav ul{display:flex; gap:2.1rem; align-items:center;}
  nav a{
    font-family:'Poppins', sans-serif; font-weight:600; font-size:.88rem;
    color:var(--navy); position:relative; padding:.3rem 0;
  }
  nav a::after{
    content:""; position:absolute; left:0; bottom:-2px; width:0; height:2px;
    background:var(--green); transition:width .2s ease;
  }
  nav a:hover::after{width:100%;}
  .nav-cta{display:flex; align-items:center; gap:1.1rem;}
  .nav-phone{display:flex; align-items:center; gap:.4rem; font-weight:700; color:var(--navy); font-size:.92rem; font-family:'Poppins',sans-serif;}

  /* ===== HERO ===== */
  .hero{
    position:relative; overflow:hidden;
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 55%, var(--blue) 100%);
    color:var(--white);
    padding:5.5rem 0 7rem;
  }
  .hero::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:linear-gradient(180deg, rgba(0,0,0,.9), rgba(0,0,0,.1));
    pointer-events:none;
  }
  .hero::after{
    content:""; position:absolute; top:-20%; right:-10%; width:60%; height:140%;
    background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,.14) 48%, rgba(255,255,255,.03) 54%, transparent 62%);
    pointer-events:none;
  }
  .hero-grid{
    position:relative; z-index:2;
    display:grid; grid-template-columns:1.05fr .95fr; gap:3rem; align-items:center;
  }
  .hero h1{
    font-size:clamp(2.1rem, 3.6vw, 3.15rem); color:var(--white); line-height:1.12; font-weight:800;
  }
  .hero h1 span{color:var(--green-light);}
  .hero p.lead{
    margin-top:1.15rem; font-size:1.06rem; color:#d7e4f2; max-width:44ch;
  }
  .hero-badges{display:flex; gap:1.6rem; margin-top:1.4rem; flex-wrap:wrap;}
  .hero-badges span{
    font-family:'Poppins', sans-serif; font-size:.82rem; font-weight:600; color:#cfe0f2;
    display:flex; align-items:center; gap:.45rem;
  }
  .hero-badges svg{flex-shrink:0;}
  .hero-cta{display:flex; gap:1rem; margin-top:2.1rem; flex-wrap:wrap;}

  .hero-photo{
    position:relative; border-radius:20px; overflow:hidden;
    aspect-ratio:4/4.6; box-shadow:0 30px 60px -25px rgba(0,10,30,.55);
  }
  .hero-photo img{width:100%; height:100%; object-fit:cover; display:block;}
  .hero-photo::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      linear-gradient(180deg, transparent 45%, var(--navy) 96%),
      linear-gradient(100deg, transparent 55%, rgba(0,41,103,.85) 100%);
  }
  .hero-photo-badge{
    position:absolute; left:1.3rem; right:1.3rem; bottom:1.3rem; z-index:2;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.22);
    backdrop-filter:blur(8px); border-radius:14px; padding:1.1rem 1.3rem;
    display:flex; align-items:center; gap:.9rem;
  }
  .hero-photo-badge .badge-ic{
    width:42px; height:42px; border-radius:10px; background:var(--green); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .hero-photo-badge strong{display:block; color:var(--white); font-family:'Poppins',sans-serif; font-size:.9rem;}
  .hero-photo-badge span{color:#cfe0f2; font-size:.78rem;}

  /* ===== SECTION HEAD ===== */
  .section{padding:5.5rem 0;}
  .section-head{max-width:640px; margin-bottom:3rem;}
  .section-head h2{font-size:clamp(1.7rem, 2.6vw, 2.3rem); margin-top:.7rem; font-weight:700;}
  .section-head p{color:#4a5a70; margin-top:.85rem; font-size:1.02rem;}
  .section-alt{background:var(--paper);}

  /* ===== SERVICES ===== */
  .service-groups{display:grid; grid-template-columns:repeat(3, 1fr); gap:1.6rem;}
  .service-card{
    background:var(--white); border:1px solid var(--line); border-radius:16px; padding:1.9rem 1.7rem;
    position:relative; overflow:hidden; transition:transform .18s ease, box-shadow .18s ease;
    display:flex; flex-direction:column;
  }
  .service-card:hover{transform:translateY(-4px); box-shadow:0 18px 34px -18px rgba(0,41,103,.35);}
  .service-card .bar{position:absolute; left:0; top:0; bottom:0; width:5px;}
  .service-card:nth-child(1) .bar{background:var(--blue);}
  .service-card:nth-child(2) .bar{background:var(--green);}
  .service-card:nth-child(3) .bar{background:var(--navy);}
  .service-icon{
    width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    margin-bottom:1.1rem;
  }
  .service-card:nth-child(1) .service-icon{background:#e7f1fc; color:var(--blue);}
  .service-card:nth-child(2) .service-icon{background:#eaf6e2; color:var(--green);}
  .service-card:nth-child(3) .service-icon{background:#e5eaf3; color:var(--navy);}
  .service-card h3{font-size:1.18rem; margin-bottom:.9rem;}

  .service-card ul li{border-top:1px dashed var(--line); padding:.75rem 0;}
  .service-card ul li:first-child{border-top:none;}

  /* Bullets con foto/video: la miniatura se muestra grande, a todo el ancho */
  .li-media{
    display:block; width:100%; aspect-ratio:16/11; object-fit:cover;
    border-radius:12px; background:var(--paper-2); border:1px solid var(--line);
    margin-bottom:.7rem; box-shadow:0 10px 22px -14px rgba(0,41,103,.35);
  }
  img.li-media{object-fit:contain;}

  /* Cada bullet es un botón: clic para abrir/cerrar su propia explicación */
  .li-caption{
    display:flex; align-items:center; gap:.55rem; width:100%;
    background:none; border:none; padding:0; margin:0; cursor:pointer; text-align:left;
    font-family:'Inter', sans-serif; color:#3d4c60; font-size:.92rem;
  }
  .li-caption svg.check-ic{flex-shrink:0;}
  .li-caption .li-text{
    flex:1; padding-top:0; font-weight:600; color:var(--navy); font-size:.9rem; font-family:'Poppins',sans-serif;
  }
  .li-caption .li-chevron{flex-shrink:0; color:#9fb0c4; transition:transform .2s ease;}
  .li-caption[aria-expanded="true"] .li-chevron{transform:rotate(90deg); color:var(--blue);}
  .li-desc{
    display:none; margin-top:.6rem; padding-left:1.55rem; font-size:.85rem; color:#556677; line-height:1.6;
  }
  .li-desc.open{display:block;}


  /* ===== WHY CHOOSE ===== */
  .why-grid{display:grid; grid-template-columns:1fr 1fr; gap:2.5rem; align-items:center;}
  .why-list{display:grid; grid-template-columns:1fr 1fr; gap:1.3rem;}
  .why-item{display:flex; gap:.9rem;}
  .why-icon{
    width:44px; height:44px; border-radius:10px; background:var(--paper-2); color:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .why-item h4{font-size:1rem; margin-bottom:.25rem;}
  .why-item p{font-size:.88rem; color:#556677;}

  .estimate-box{
    background:linear-gradient(135deg, var(--green) 0%, #3f8420 100%);
    border-radius:18px; padding:2.6rem; color:var(--white); position:relative; overflow:hidden;
  }
  .estimate-box::after{
    content:""; position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
    background-size:40px 40px; mask-image:radial-gradient(circle at 70% 30%, rgba(0,0,0,.8), transparent 70%);
  }
  .estimate-box h3{color:var(--white); font-size:1.5rem; position:relative; z-index:1;}
  .estimate-box p{color:#e7f3dd; margin:.9rem 0 1.5rem; font-size:.95rem; position:relative; z-index:1; max-width:38ch;}
  .estimate-box .btn-outline{position:relative; z-index:1;}
  .estimate-phone{
    margin-top:1.1rem; display:flex; align-items:center; gap:.5rem; font-family:'Poppins',sans-serif;
    font-weight:700; position:relative; z-index:1;
  }

  /* ===== SERVICE AREA STRIP ===== */
  .strip{background:var(--navy); color:var(--white); padding:1.4rem 0;}
  .strip .container{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;}
  .strip p{font-family:'Poppins',sans-serif; font-weight:600; font-size:.95rem; color:#dbe7f5;}
  .strip strong{color:var(--green-light);}

  /* ===== CONTACT ===== */
  .contact-grid{display:grid; grid-template-columns:.95fr 1.05fr; gap:3rem;}
  .contact-info-list{margin-top:1.8rem; display:flex; flex-direction:column; gap:1.3rem;}
  .contact-info-item{display:flex; gap:1rem; align-items:flex-start;}
  .contact-info-item .ic{
    width:46px; height:46px; border-radius:10px; background:var(--paper-2); color:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .contact-info-item strong{display:block; font-family:'Poppins',sans-serif; font-size:.94rem; color:var(--navy);}
  .contact-info-item span{font-size:.88rem; color:#556677;}

  .form-card{background:var(--paper); border:1px solid var(--line); border-radius:18px; padding:2.2rem;}
  .form-card h3{font-size:1.2rem; margin-bottom:1.3rem;}
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;}
  .form-card input, .form-card textarea{
    width:100%; border:1px solid var(--line); border-radius:9px; padding:.85rem .95rem;
    font-family:'Inter', sans-serif; font-size:.92rem; background:var(--white); color:var(--ink);
  }
  .form-card textarea{grid-column:1/-1; min-height:110px; resize:vertical; margin-bottom:1.2rem;}
  .form-card input:focus, .form-card textarea:focus{outline:2px solid var(--blue-light); outline-offset:1px;}
  .form-card .btn{width:100%; justify-content:center;}

  /* ===== FOOTER ===== */
  footer{background:var(--navy); color:#c6d5e8; padding:4rem 0 1.6rem;}
  .footer-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:2.4rem; padding-bottom:2.6rem; border-bottom:1px solid rgba(255,255,255,.12);}
  .footer-brand img{height:60px; margin-bottom:1rem;}
  .footer-brand p{font-size:.86rem; color:#a9bdd6; max-width:32ch;}
  footer h4{color:var(--white); font-family:'Poppins',sans-serif; font-size:.95rem; margin-bottom:1.1rem;}
  footer ul li{margin-bottom:.6rem;}
  footer ul li a{font-size:.86rem; color:#b7c8de; transition:color .15s;}
  footer ul li a:hover{color:var(--green-light);}
  .footer-bottom{
    display:flex; justify-content:space-between; align-items:center; padding-top:1.6rem; flex-wrap:wrap; gap:.8rem;
    font-size:.8rem; color:#8fa5c1;
  }

  @media (max-width: 980px){
    nav ul{display:none;}
    .hero-grid{grid-template-columns:1fr;}
    .hero-photo{order:-1;}
    .service-groups{grid-template-columns:1fr;}
    .why-grid{grid-template-columns:1fr;}
    .contact-grid{grid-template-columns:1fr;}
    .footer-grid{grid-template-columns:1fr 1fr;}
    .nav-phone span{display:none;}
  }
  @media (max-width: 560px){
    .hero-badges{flex-direction:column; gap:.7rem;}
    .form-row{grid-template-columns:1fr;}
    .footer-grid{grid-template-columns:1fr;}
  }
</style>
</head>
